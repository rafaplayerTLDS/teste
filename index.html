<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sorteio de Valores - Ações NEXUS</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Arial', sans-serif; background: #1a1a1a; color: #fff; padding: 20px; min-height: 100vh; }
        .container { max-width: 900px; margin: 0 auto; }
        .header-nexus { display: flex; align-items: stretch; background: #e6e6e6; border: 3px solid #000; margin-bottom: 30px; }
        .nexus-box { background: linear-gradient(180deg, #8b1a1a 0%, #5a0f0f 100%); padding: 20px 40px; display: flex; align-items: center; justify-content: center; border-right: 3px solid #000; min-width: 200px; }
        .nexus-logo { font-size: 42px; font-weight: 900; letter-spacing: 2px; color: #fff; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); }
        .nexus-logo .x { color: #ff0000; font-size: 48px; }
        .titulo-acoes { flex: 1; display: flex; align-items: center; justify-content: center; font-size: 36px; font-style: italic; font-weight: bold; color: #000; padding: 20px; }
        .nexus-box-right { background: linear-gradient(180deg, #8b1a1a 0%, #5a0f0f 100%); padding: 20px 40px; display: flex; align-items: center; justify-content: center; border-left: 3px solid #000; min-width: 200px; }
        .selector-box { background: #2a2a2a; padding: 30px; border: 3px solid #444; border-radius: 8px; margin-bottom: 30px; }
        .selector-box h3 { color: #ff3b3b; margin-bottom: 20px; font-size: 20px; text-align: center; }
        label { display: block; margin-bottom: 10px; font-weight: 600; color: #d4a8a8; text-transform: uppercase; font-size: 13px; }
        select, input { width: 100%; padding: 12px; background: #1a1a1a; color: #fff; border: 2px solid #444; border-radius: 6px; font-size: 15px; font-weight: 600; margin-bottom: 20px; }
        select { cursor: pointer; }
        input::placeholder { color: #666; }
        select:focus, input:focus { outline: none; border-color: #ff3b3b; }
        button { width: 100%; padding: 15px; background: linear-gradient(135deg, #ff3b3b 0%, #c41f1f 100%); color: #fff; font-weight: 700; font-size: 16px; cursor: pointer; border: none; border-radius: 8px; transition: all 0.3s; text-transform: uppercase; letter-spacing: 1px; box-shadow: 0 4px 15px rgba(255,59,59,0.4); }
        button:hover { background: linear-gradient(135deg, #e63030 0%, #a81818 100%); box-shadow: 0 6px 20px rgba(255,59,59,0.6); transform: translateY(-2px); }
        button:active { transform: translateY(0); }
        button:disabled { background: #444; cursor: not-allowed; box-shadow: none; }
        .result-box { background: #e6e6e6; border: 3px solid #000; padding: 0; border-radius: 8px; overflow: hidden; display: none; }
        .result-box.show { display: block; }
        .result-header { background: #000; color: #fff; padding: 15px; text-align: center; font-weight: 700; font-size: 18px; text-transform: uppercase; }
        .result-content { padding: 30px; color: #000; }
        .result-item { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 2px solid #ccc; font-size: 15px; }
        .result-item:last-child { border-bottom: none; }
        .result-label { font-weight: 700; text-transform: uppercase; }
        .result-value { font-weight: 600; }
        .result-valor-sorteado { background: #000; color: #4ade80; padding: 20px; margin-top: 20px; border-radius: 6px; text-align: center; }
        .result-valor-sorteado .label { font-size: 14px; color: #fff; margin-bottom: 10px; text-transform: uppercase; font-weight: 600; }
        .result-valor-sorteado .valor { font-size: 32px; font-weight: 900; color: #4ade80; }
        .button-group { display: flex; gap: 10px; margin-top: 20px; }
        .solicitacao-box { background: #2a2a2a; padding: 25px; border: 3px solid #444; border-radius: 8px; margin-top: 30px; display: none; }
        .solicitacao-box.show { display: block; }
        .solicitacao-box h3 { color: #ff3b3b; margin-bottom: 20px; font-size: 18px; text-align: center; }
        .solicitacao-content { background: #1a1a1a; padding: 20px; border-radius: 6px; border: 2px solid #444; margin-bottom: 15px; }
        .solicitacao-texto { color: #fff; font-family: 'Courier New', monospace; font-size: 14px; line-height: 1.6; white-space: pre-wrap; word-break: break-word; }
        .comando-texto { color: #4ade80; font-family: 'Courier New', monospace; font-size: 16px; font-weight: 600; }
        .btn-copy { background: linear-gradient(135deg, #4ade80 0%, #22c55e 100%); margin-bottom: 10px; }
        .btn-copy:hover { background: linear-gradient(135deg, #22c55e 0%, #16a34a 100%); }
        .historico-box { background: #2a2a2a; padding: 25px; border: 3px solid #444; border-radius: 8px; margin-top: 30px; max-height: 400px; overflow-y: auto; }
        .historico-box h3 { color: #ff3b3b; margin-bottom: 15px; font-size: 18px; text-align: center; }
        .historico-item { background: #1a1a1a; padding: 12px; margin-bottom: 10px; border-radius: 6px; border-left: 4px solid #ff3b3b; display: flex; justify-content: space-between; align-items: center; gap: 10px; }
        .historico-item-info { flex: 1; }
        .historico-item-nome { font-weight: 700; color: #ff3b3b; margin-bottom: 5px; }
        .historico-item-data { font-size: 11px; color: #888; margin-bottom: 5px; }
        .historico-item-valor { color: #4ade80; font-weight: 600; font-size: 18px; }
        .btn-carregar { background: linear-gradient(135deg, #dc2626 0%, #991b1b 100%); padding: 6px 12px; border: none; border-radius: 4px; color: #fff; font-weight: 600; font-size: 11px; cursor: pointer; transition: all 0.3s; white-space: nowrap; box-shadow: 0 2px 8px rgba(220,38,38,0.3); min-width: 80px; width: auto; }
        .btn-carregar:hover { background: linear-gradient(135deg, #b91c1c 0%, #7f1d1d 100%); transform: scale(1.05); }
        .empty-historico { text-align: center; color: #666; font-style: italic; padding: 20px; }
        @media (max-width: 768px) {
            .header-nexus { flex-direction: column; }
            .nexus-box, .nexus-box-right { border-right: none; border-left: none; border-bottom: 3px solid #000; min-width: 100%; }
            .nexus-box-right { border-bottom: none; border-top: 3px solid #000; }
            .titulo-acoes { font-size: 28px; }
            .nexus-logo { font-size: 32px; }
            .nexus-logo .x { font-size: 36px; }
            .button-group { flex-direction: column; }
            .historico-item { flex-direction: column; align-items: stretch; }
            .btn-carregar { width: 100%; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header-nexus">
        <div class="nexus-box"><div class="nexus-logo">NE<span class="x">X</span>US</div></div>
        <div class="titulo-acoes">Valores das ações</div>
        <div class="nexus-box-right"><div class="nexus-logo">NE<span class="x">X</span>US</div></div>
    </div>

    <div class="selector-box">
        <h3>🎲 Selecione a Ação para Sortear</h3>
        <label>ID do Player:</label>
        <input type="text" id="inputPlayerId" placeholder="Digite o ID do player">
        <label>Escolha a Ação:</label>
        <select id="selectAcao"><option value="">-- Selecione uma ação --</option></select>
        <button id="btnSortear" onclick="sortearAcao()" disabled>🎲 Sortear Valor</button>
    </div>

    <div class="result-box" id="resultBox">
        <div class="result-header">RESULTADO DO SORTEIO</div>
        <div class="result-content">
            <div class="result-item"><span class="result-label">ID do Player:</span><span class="result-value" id="resultPlayerId">-</span></div>
            <div class="result-item"><span class="result-label">Ação:</span><span class="result-value" id="resultNome">-</span></div>
            <div class="result-item"><span class="result-label">Valor Mínimo:</span><span class="result-value" id="resultMinimo">-</span></div>
            <div class="result-item"><span class="result-label">Valor Máximo:</span><span class="result-value" id="resultMaximo">-</span></div>
            <div class="result-item"><span class="result-label">Item Necessário:</span><span class="result-value" id="resultItem">-</span></div>
            <div class="result-valor-sorteado">
                <div class="label">💰 Valor Sorteado</div>
                <div class="valor" id="resultValor">$ 0,00</div>
            </div>
            <div class="button-group">
                <button onclick="sortearNovamente()">🔄 Sortear Novamente</button>
            </div>
        </div>
    </div>

    <div class="solicitacao-box" id="solicitacaoBox">
        <h3>📝 Solicitação de Devolução</h3>
        <div class="solicitacao-content"><div class="solicitacao-texto" id="solicitacaoTexto"></div></div>
        <button class="btn-copy" onclick="copiarSolicitacao()">📋 Copiar Solicitação</button>
        <div class="solicitacao-content"><div class="comando-texto" id="comandoTexto"></div></div>
        <button class="btn-copy" onclick="copiarComando()">📋 Copiar Comando</button>
    </div>

    <div class="historico-box">
        <h3>📊 Histórico de Sorteios</h3>
        <div id="historicoLista"><div class="empty-historico">Nenhum sorteio realizado ainda</div></div>
        <button onclick="limparHistorico()" style="margin-top: 15px;">🗑️ Limpar Histórico</button>
    </div>
</div>

    function carregarHistoricoStorage() {
        var h = localStorage.getItem('nexus_historico');
        if (h) {
            try {
                historico = JSON.parse(h).map(function(i) { return Object.assign(i, {timestamp: new Date(i.timestamp)}); });
            } catch(e) { historico = []; }
        }
    }

    function salvarHistoricoStorage() {
        try { localStorage.setItem('nexus_historico', JSON.stringify(historico)); } catch(e) {}
    }

    function formatarDataHora(d) {
        var pad = function(n) { return String(n).padStart(2,'0'); };
        return pad(d.getDate())+'/'+pad(d.getMonth()+1)+'/'+d.getFullYear()+' às '+pad(d.getHours())+':'+pad(d.getMinutes())+':'+pad(d.getSeconds());
    }

    function formatarDinheiro(v) {
        return '$ ' + v.toLocaleString('pt-BR', {minimumFractionDigits:2, maximumFractionDigits:2});
    }

    function sortearValor(min, max) {
        return Math.floor(Math.random() * (max - min + 1)) + min;
    }

    function popularSelect() {
        var sel = document.getElementById('selectAcao');
        acoes.forEach(function(a, i) {
            var opt = document.createElement('option');
            opt.value = i;
            opt.textContent = a.nome;
            sel.appendChild(opt);
        });
    }

    function habilitarBotao() {
        var sel = document.getElementById('selectAcao');
        var inp = document.getElementById('inputPlayerId');
        document.getElementById('btnSortear').disabled = sel.value === '' || inp.value.trim() === '';
    }

    function sortearAcao() {
        var sel = document.getElementById('selectAcao');
        var playerId = document.getElementById('inputPlayerId').value.trim();
        var index = parseInt(sel.value);
        if (isNaN(index) || playerId === '') return;
        var acao = acoes[index];
        var val = sortearValor(acao.minimo, acao.maximo);
        ultimoSorteio = {playerId: playerId, acao: acao.nome, valor: val};
        document.getElementById('resultPlayerId').textContent = playerId;
        document.getElementById('resultNome').textContent = acao.nome;
        document.getElementById('resultMinimo').textContent = formatarDinheiro(acao.minimo);
        document.getElementById('resultMaximo').textContent = formatarDinheiro(acao.maximo);
        document.getElementById('resultItem').textContent = acao.item;
        document.getElementById('resultValor').textContent = formatarDinheiro(val);
        document.getElementById('resultBox').classList.add('show');
        gerarSolicitacao(playerId, acao.nome, val);
        historico.unshift({playerId:playerId, nome:acao.nome, valor:val, timestamp:new Date()});
        salvarHistoricoStorage();
        atualizarHistorico();
        document.getElementById('resultBox').scrollIntoView({behavior:'smooth', block:'nearest'});
    }

    function gerarSolicitacao(pid, nome, val) {
        document.getElementById('solicitacaoTexto').textContent =
            'SOLICITAÇÃO DE DEVOLUÇÃO\nID: '+pid+'\nMotivo: Ganhou ação marcada '+nome+'\nItens: dinheiro sujo '+val.toLocaleString('pt-BR')+'\nProvas:\n<@&1362168080716927133>';
        document.getElementById('comandoTexto').textContent = 'solicitar '+pid+' dinheirosujer '+val;
        document.getElementById('solicitacaoBox').classList.add('show');
    }

    function sortearNovamente() { sortearAcao(); }

    function copiarSolicitacao() {
        navigator.clipboard.writeText(document.getElementById('solicitacaoTexto').textContent).catch(function(){});
    }

    function copiarComando() {
        navigator.clipboard.writeText(document.getElementById('comandoTexto').textContent).catch(function(){});
    }

    function carregarSorteio(idx) {
        var item = historico[idx];
        if (!item) return;
        document.getElementById('inputPlayerId').value = item.playerId;
        var acaoIdx = acoes.findIndex(function(a) { return a.nome === item.nome; });
        if (acaoIdx !== -1) document.getElementById('selectAcao').value = acaoIdx;
        habilitarBotao();
        var acao = acoes[acaoIdx];
        document.getElementById('resultPlayerId').textContent = item.playerId;
        document.getElementById('resultNome').textContent = item.nome;
        document.getElementById('resultMinimo').textContent = formatarDinheiro(acao.minimo);
        document.getElementById('resultMaximo').textContent = formatarDinheiro(acao.maximo);
        document.getElementById('resultItem').textContent = acao.item;
        document.getElementById('resultValor').textContent = formatarDinheiro(item.valor);
        document.getElementById('resultBox').classList.add('show');
        gerarSolicitacao(item.playerId, item.nome, item.valor);
        document.querySelector('.selector-box').scrollIntoView({behavior:'smooth', block:'start'});
    }

    function atualizarHistorico() {
        var lista = document.getElementById('historicoLista');
        if (historico.length === 0) {
            lista.innerHTML = '<div class="empty-historico">Nenhum sorteio realizado ainda</div>';
            return;
        }
        lista.innerHTML = '';
        historico.slice(0, 10).forEach(function(item, idx) {
            var div = document.createElement('div');
            div.className = 'historico-item';
            div.innerHTML = '<div class="historico-item-info"><div class="historico-item-nome">ID: '+item.playerId+' - '+item.nome+'</div><div class="historico-item-data">📅 '+formatarDataHora(item.timestamp)+'</div><div class="historico-item-valor">'+formatarDinheiro(item.valor)+'</div></div><button class="btn-carregar" onclick="window._nx_carregarSorteio('+idx+')">📂 Carregar</button>';
            lista.appendChild(div);
        });
    }

    function limparHistorico() {
        if (confirm('Deseja realmente limpar todo o histórico?')) {
            historico = [];
            salvarHistoricoStorage();
            atualizarHistorico();
        }
    }

    
    window.sortearAcao = sortearAcao;
    window.sortearNovamente = sortearNovamente;
    window.copiarSolicitacao = copiarSolicitacao;
    window.copiarComando = copiarComando;
    window.limparHistorico = limparHistorico;
    window._nx_carregarSorteio = carregarSorteio;

    document.getElementById('selectAcao').addEventListener('change', habilitarBotao);
    document.getElementById('inputPlayerId').addEventListener('input', habilitarBotao);

    window.onload = function() {
        carregarHistoricoStorage();
        popularSelect();
        atualizarHistorico();
    };


    document.addEventListener('contextmenu', function(e) { e.preventDefault(); });

    document.addEventListener('keydown', function(e) {
        if (e.key === 'F12') e.preventDefault();
        if (e.ctrlKey && e.shiftKey && e.key === 'I') e.preventDefault();
        if (e.ctrlKey && e.shiftKey && e.key === 'J') e.preventDefault();
        if (e.ctrlKey && e.shiftKey && e.key === 'C') e.preventDefault();
        if (e.ctrlKey && e.key === 'u') e.preventDefault();
        if (e.ctrlKey && e.key === 's') e.preventDefault();
        if (e.ctrlKey && e.key === 'a') e.preventDefault();
        if (e.ctrlKey && e.key === 'p') e.preventDefault();
    });

    setInterval(function() {
        if (window.outerWidth - window.innerWidth > 160 || window.outerHeight - window.innerHeight > 160) {
            document.body.innerHTML = "<div style='display:flex;align-items:center;justify-content:center;height:100vh;background:#1a1a1a;'><h1 style='color:#ff3b3b;font-family:Arial;text-align:center;'>⛔ Acesso bloqueado.<br><small style=\"font-size:16px;color:#888;\">Ferramentas de desenvolvedor detectadas.</small></h1></div>";
        }
    }, 1000);

    setInterval(function() {
        var t = performance.now();
        (function() {}());
        if (performance.now() - t > 100) {
            document.body.innerHTML = "<div style='display:flex;align-items:center;justify-content:center;height:100vh;background:#1a1a1a;'><h1 style='color:#ff3b3b;font-family:Arial;text-align:center;'>⛔ Acesso bloqueado.<br><small style=\"font-size:16px;color:#888;\">Depurador detectado.</small></h1></div>";
        }
    }, 2000);

    document.addEventListener('selectstart', function(e) { e.preventDefault(); });
    document.addEventListener('dragstart', function(e) { e.preventDefault(); });
    window.onbeforeprint = function() {
        document.body.innerHTML = "<div style='display:flex;align-items:center;justify-content:center;height:100vh;background:#1a1a1a;'><h1 style='color:#ff3b3b;font-family:Arial;'>⛔ Impressão bloqueada.</h1></div>";
    };

})();
</script>
</body>
</html>
